blueprint:
  name: Hue Dimmer V1 Light Control
  description: Control lights and areas with a Hue Dimmer V1
  domain: automation

  input:
    remote:
      name: Hue Dimmer
      selector:
        device:
          integration: hue
  
    target_lights:
      name: Lights and Areas
      default: {}
      optional: true
      selector:
        target:
          entity:
            domain: 
              - light

    target_power:
      name: Outlets and power
      default: {}
      optional: true
      selector:
        target:
          entity:
            domain: 
              - light
    
    brightness_step:
      name: Brightness Step
      default: 10
      selector:
        number:
          min: 1
          max: 50
          step: 1
  
variables:
  brightness_step: !input brightness_step
  target_lights: !input target_lights
  target_power: !input target_power
  
trigger:
  - platform: device
    domain: hue
    device_id: !input remote
    type: initial_press
    subtype: 1
    id: "on"
  
  - platform: device
    domain: hue
    device_id: !input remote
    type: initial_press
    subtype: 4
    id: "off"
  
  - platform: device
    domain: hue
    device_id: !input remote
    type: initial_press
    subtype: 2
    id: "brighten"
  
  - platform: device
    domain: hue
    device_id: !input remote
    type: initial_press
    subtype: 3
    id: "dim"
 
action:
  - choose:
      - conditions:
          - condition: trigger
            id: "on"
        sequence:
          - condition: template
            value_template: "{{ target_lights.entity_id | default([]) | length > 0 }}"
          - service: homeassistant.turn_on
            target: !input target_lights

          - condition: template
            value_template: "{{ target_lights.entity_id | default([]) | length > 0 }}"
          - service: homeassistant.turn_on
            target: !input target_power
      
      - conditions:
          - condition: trigger
            id: "off"
        sequence:
          - condition: template
            value_template: "{{ target_power.entity_id | default([]) | length > 0 }}"
          - service: homeassistant.turn_off
            target: !input target_lights

          - condition: template
            value_template: "{{ target_power.entity_id | default([]) | length > 0 }}"
          - service: homeassistant.turn_off
            target: !input target_power
      
      - conditions:
          - condition: trigger
            id: "brighten"
        sequence:
          - condition: template
            value_template: "{{ target_lights.entity_id | default([]) | length > 0 }}"
          - service: light.turn_on
            target: !input target_lights
            data:
              brightness_step_pct: "{{ brightness_step }}"
      - conditions:
          - condition: trigger
            id: "dim"
        sequence:
          - condition: template
            value_template: "{{ target_lights.entity_id | default([]) | length > 0 }}"
          - service: light.turn_on
            target: !input target_lights
            data:
              brightness_step_pct: "{{ -brightness_step }}"
